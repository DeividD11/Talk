    <style>
        :root {
            /* Variables globales (comunes a todos los temas) */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --font-base: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-fancy: 'Dancing Script', cursive;
            --fs-min: 14px;
            --fs-max: 18px;
            --space-xs: clamp(4px, 1vw, 8px);
            --space-sm: clamp(8px, 2vw, 16px);
            --space-md: clamp(12px, 3vw, 24px);
            --space-lg: clamp(16px, 4vw, 32px);
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 2rem;
            --speed: 0.6s;
            --ar-img-default: 16/9;
            --img-intrinsic-width: 800px;
            --img-intrinsic-height: 450px;
            transition: background var(--speed) ease, color var(--speed) ease;
        }

        /* Tema Light (por defecto) */
        :root:not([data-theme="dark"]) {
            --color-bg-start: #f2cc8f;
            --color-bg-end: #fff1e0;
            --color-text: #333;
            --color-primary: #e07a5f;
            --color-accent: #f2cc8f;
            --color-button-bg: #e07a5f;
            --color-button-text: #fff;
            --color-button-hover: #c2595a;
            --color-link: #e07a5f;
            --color-link-hover: #b84d4d;
            --shadow-sm: 0 4px 10px rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Tema Dark */
        [data-theme="dark"] {
            --color-bg-start: #4b3f72;
            --color-bg-end: #1a1a1a;
            --color-text: #eee;
            --color-primary: #f2cc8f;
            --color-accent: #4b3f72;
            --color-button-bg: #f2cc8f;
            --color-button-text: #333;
            --color-button-hover: #e0b87a;
            --color-link: #f2cc8f;
            --color-link-hover: #d4a76a;
            --shadow-sm: 0 4px 10px rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
        }

        /* Variables derivadas (gradientes, etc.) */
        :root {
            --color-bg-gradient: linear-gradient(135deg, var(--color-bg-start), var(--color-bg-end));
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --color-bg-start: #4b3f72;
                --color-bg-end: #1a1a1a;
                --color-text: #eee;
                --color-primary: #f2cc8f;
                --color-accent: #4b3f72;
                --color-button-bg: #f2cc8f;
                --color-button-text: #333;
                --color-button-hover: #e0b87a;
                --color-link: #f2cc8f;
                --color-link-hover: #d4a76a;
                --shadow-sm: 0 4px 10px rgba(255, 255, 255, 0.05);
                --shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
            }
        }

        /* Tema High-Contrast (automático si el usuario lo prefiere) */
        @media (prefers-contrast: high) {
            :root {
                --color-text: #000;
                --color-bg-start: #fff;
                --color-bg-end: #fff;
                --color-primary: #000;
                --color-accent: #000;
                --color-button-bg: #000;
                --color-button-text: #fff;
                --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3);
                --shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            }

            [data-theme="dark"] {
                --color-text: #fff;
                --color-bg-start: #000;
                --color-bg-end: #000;
                --color-primary: #fff;
                --color-accent: #fff;
                --color-button-bg: #fff;
                --color-button-text: #000;
            }
        }

        /* Permitir overrides personalizados (ej. para testing) */
        :root {
            --custom-primary: var(--color-primary);
            /* Fallback a default */
        }

        .card {
            background: var(--custom-primary);
            /* Ejemplo de uso */
        }

        html {
            /* safe-area fallback for older iOS */
            padding-top: constant(safe-area-inset-top);
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);

            font-size: clamp(var(--fs-min), 4vw, var(--fs-max));
            scroll-behavior: smooth;
            scroll-padding-top: var(--safe-top);
            -webkit-text-size-adjust: 100%;
            /* coment: evita zoom automático y respeta clamp() en Safari iOS */
        }

        body,
        main {
            /* coment: frena rebotes de scroll y evita propagación de overscroll */
            overscroll-behavior: contain;
            transition: background var(--speed) ease, color 0.3s ease;
            /* Más rápida para color */
            contain: layout;
            /* Limita repaints al cambiar temas */
        }

        body {
            margin: 0;
            padding: 0;
            padding-inline: clamp(var(--space-md), 5vw, var(--space-lg));
            font-family: var(--font-base);
            line-height: 1.6;
            color: var(--color-text);
            background: var(--color-bg-gradient);
            background-size: 200% 100%;
            transition: background var(--speed), color var(--speed);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: pan-y pinch-zoom;
        }

        main {
            width: 100%;
            max-width: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: var(--space-md);
            contain: layout;
            scroll-snap-type: y proximity;
        }

        @media (min-width: 400px) {
            main {
                max-width: min(500px, 100%);
            }
        }

        @media (min-width: 768px) {
            main {
                max-width: min(720px, 100%);
            }
        }

        .card {
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            padding: var(--space-md);
            animation: fadeInUp var(--speed) ease;
            backface-visibility: hidden;
            contain: layout;
            contain-intrinsic-size: 280px 160px;
            /* coment: ancho×alto aproximado de la tarjeta */
            container-type: inline-size;
            /* coment: habilita container queries en el ancho */
            container-name: card;
            /* coment: nombra el contenedor para referenciar */
            background-color: var(--color-accent);
            /* coment: respaldo color sólido */
            background-image: var(--color-bg-gradient);
            /* coment: gradiente para efecto parallax */
            background-size: 150% 150%;
            /* coment: amplía área de fondo para movimiento */
            background-position: center center;
            /* coment: posición inicial centrada */
            transition: transform var(--speed) ease,
                /* coment: animar movimiento y gradiente */
                background-position calc(var(--speed) * 1.2) ease;
        }

        .card>* {
            opacity: 0;
            animation: fadeInUp var(--speed) ease forwards;
            animation-delay: 0s;
        }

        /* animación escalonada */
        .card>*:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card>*:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card>*:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card>*:nth-child(4) {
            animation-delay: 0.4s;
        }

        .card>*:nth-child(5) {
            animation-delay: 0.5s;
        }

        /* puedes extender según la cantidad de elementos */

        @media (prefers-reduced-motion: reduce) {
            .card>* {
                animation: none !important;
                opacity: 1 !important;
            }
        }

        @container card (max-width: 400px) {
            .card {
                padding: var(--space-sm);
                /* coment: menos padding en tarjetas estrechas */
            }
        }

        @container card (min-width: 401px) and (max-width: 720px) {
            .card {
                padding: var(--space-md);
                /* coment: padding medio en ancho intermedio */
                grid-template-columns: 1fr 1fr;
                /* coment: disposición a dos columnas si cabe */
                gap: var(--space-sm);
            }
        }

        @container card (min-width: 721px) {
            .card {
                padding: var(--space-lg);
                /* coment: más padding en tarjetas amplias */
                grid-template-columns: repeat(3, 1fr);
                /* coment: hasta tres columnas internas */
                gap: var(--space-md);
            }
        }

        .card:hover {
            will-change: transform, background-position;
            transform: translateY(-4px);
            background-position: 80% 20%;
            /* coment: desplaza gradiente al interactuar */
        }

        @media (prefers-reduced-motion: reduce) {
            .card {
                transition: transform var(--speed) ease;
                /* coment: omite movimiento de fondo si reduce-motion */
            }
        }

        header {
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-family: var(--font-fancy);
            color: var(--color-primary);
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 1.1;
            animation: popIn var(--speed) ease;
            backface-visibility: hidden;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--space-sm);
        }

        .toggle,
        .skip {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(2.75rem, 10vw, 3rem);
            height: clamp(2.75rem, 10vw, 3rem);
            min-width: 44px;
            min-height: 44px;
            font-size: 1.2rem;
            background: none;
            border: none;
            border-radius: 50%;
            color: var(--color-text);
            cursor: pointer;
            transition: transform var(--speed), outline var(--speed);
            touch-action: manipulation;
        }

        .toggle,
        .skip,
        button.main {
            /* coment: padding lógico para ampliar área de toque sin romper diseño */
            padding: max(0.75rem, 22px) max(1rem, 22px);
            min-width: 44px;
            box-shadow: var(--shadow);
            transition: background 0.2s ease, color 0.2s ease, transform var(--speed) ease, box-shadow var(--speed) ease;
            will-change: background, color, transform;
            /* Optimiza GPU */
            min-height: 44px;
            user-select: none;
            /* coment: evita selección accidental de texto */
            cursor: pointer;
        }

        @media (pointer: coarse) {

            .toggle,
            .skip,
            button.main {
                touch-action: manipulation;
                /* coarse touch */
            }
        }

        .toggle:focus-visible,
        .skip:focus-visible,
        button.main:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: var(--space-sm);
        }

        .toggle:hover,
        .toggle:focus-visible,
        .skip:hover,
        .skip:focus-visible,
        button.main:hover,
        button.main:focus-visible {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            will-change: transform, box-shadow;
        }

        .toggle:active,
        .skip:active,
        button.main:active {
            transform: scale(0.95) rotate(0deg);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        @media (prefers-reduced-motion: reduce) {

            .toggle,
            .skip,
            button.main {
                transition: box-shadow var(--speed) ease;
                /* coment: omite movimiento de fondo si reduce-motion */
            }

            .toggle:hover,
            .toggle:focus-visible,
            .skip:hover,
            .skip:focus-visible,
            button.main:hover,
            button.main:focus-visible,
            .toggle:active,
            .skip:active,
            button.main:active {
                transform: none;
            }
        }

        @media (forced-colors: active) {

            /* coment: deshabilitar ajustes automáticos de forced-colors */
            * {
                forced-color-adjust: none;
            }

            /* coment: fondo y texto principales con colores de sistema */
            body {
                background-color: Canvas;
                color: CanvasText;
            }

            /* coment: tarjetas con borde y fondo de alto contraste */
            .card {
                background-color: Field;
                border: 2px solid CanvasText;
                color: CanvasText;
            }

            /* coment: controles interactivos adaptados al modo forzado */
            .toggle,
            .skip,
            button.main {
                background-color: ButtonFace;
                color: ButtonText;
            }

            /* coment: foco muy visible usando Highlight */
            .toggle:focus-visible,
            .skip:focus-visible,
            button.main:focus-visible {
                outline: 2px solid Highlight;
                outline-offset: var(--space-sm);
            }

            /* coment: barra de progreso siempre legible */
            .progress {
                background-color: GrayText;
            }

            .progress-bar {
                background-color: Highlight;
            }
        }

        .toggle::after,
        .skip::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: 50%;
            left: 50%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }

        .ripple::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            transition: none;
        }

        .text {
            overflow: hidden;
            border-right: 2px solid currentColor;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: var(--font-base);
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-bottom: var(--space-sm);
            min-height: calc(1rem * 1.2 * 3);
            /* coment: espacio para 3 líneas con line-height 1.2 */
            line-height: 1.6;
        }

        .progress {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: var(--space-md);
            contain: layout;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: var(--color-primary);
            transform-origin: left;
            transform: scaleX(0);
            transition: transform var(--speed) ease;
        }

        .progress-bar.animating {
            will-change: transform;
            /* coment: capa GPU solo mientras dura la animación */
        }

        button.main {
            display: block;
            margin: var(--space-md) auto;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-base);
            font-weight: 600;
            font-size: clamp(0.9rem, 3vw, 1rem);
            color: #fff;
            background: var(--color-primary);
            border: none;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: background var(--speed), transform var(--speed), outline var(--speed);
        }

        #btn-sorpresa[aria-expanded="true"] {
            background: #c2595a;
            animation: heartbeat 1s infinite ease-in-out;
        }

        #sorpresa {
            display: none;
            margin-top: var(--space-md);
            text-align: center;
            font-family: var(--font-base);
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            color: var(--color-primary);
            animation: fadeIn 0.5s ease forwards;
        }

        [aria-expanded="true"]+#sorpresa {
            display: block;
        }

        aside {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeInUp var(--speed) 0.2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
            }

            to {
                transform: scale(1);
            }
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (forced-colors: active) {

            /* coment: deshabilitar ajustes automáticos de forced-colors */
            * {
                forced-color-adjust: none;
            }

            /* coment: fondo y texto principales con colores de sistema */
            body {
                background-color: Canvas;
                color: CanvasText;
            }

            /* coment: tarjetas con borde y fondo de alto contraste */
            .card {
                background-color: Field;
                border: 2px solid CanvasText;
                color: CanvasText;
            }

            /* coment: controles interactivos adaptados al modo forzado */
            .toggle,
            .skip,
            button.main {
                background-color: ButtonFace;
                color: ButtonText;
            }

            /* coment: foco muy visible usando Highlight */
            .toggle:focus-visible,
            .skip:focus-visible,
            button.main:focus-visible {
                outline: 2px solid Highlight;
                outline-offset: var(--space-sm);
            }

            /* coment: barra de progreso siempre legible */
            .progress {
                background-color: GrayText;
            }

            .progress-bar {
                background-color: Highlight;
            }
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            border: 0;
            padding: 0;
            clip: rect(0 0 0 0);
            overflow: hidden;
            white-space: nowrap;
        }
    </style>

</head>

<body>
    <a href="#content" class="visually-hidden">Saltar al contenido</a>

    <main id="content" role="main">
        <header role="banner">
            <h1 id="title">Para Mi preciosa princesa</h1>

            <nav class="controls" aria-label="Controles de la carta">
                <button type="button" class="toggle" id="theme-toggle" aria-label="Cambiar a tema oscuro" aria-pressed="false">🌙</button>
                <button type="button" class="skip" id="skip-btn" aria-label="Saltar animación de escritura" aria-describedby="skip-description">⏭️</button>
                <div id="skip-description" class="visually-hidden">Presiona para completar la escritura de la carta inmediatamente.</div>
            </nav>
        </header>

        <figure class="card" aria-labelledby="title">

            <article id="carta" class="text" lang="es" aria-live="polite" aria-atomic="false">
                <!-- Contenido dinámico -->
            </article>

            <div class="progress" aria-label="Barra de progreso de lectura">
                <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
            </div>

            <button type="button" id="btn-sorpresa" class="main" aria-controls="sorpresa" aria-expanded="false" aria-describedby="sorpresa-description">Ver sorpresa</button>
            <div id="sorpresa-description" class="visually-hidden">Revela un mensaje especial de amor.</div>
            <div id="sorpresa" aria-label="Mensaje sorpresa" aria-live="assertive" aria-hidden="true">
                ¡Te amo más allá de las estrellas! ⭐
            </div>
        </figure>

        <aside role="contentinfo">
            <p>Con todo mi amor, tu Dev.</p>
        </aside>
    </main>

    <script defer>
        (function() {
            'use strict';

            // Polyfills para compatibilidad
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = (cb) => setTimeout(cb, 16); // ~60fps
                window.cancelAnimationFrame = clearTimeout;
            }

            // Fallback para localStorage
            const storage = (() => {
                try {
                    return window.localStorage;
                } catch (e) {
                    return {
                        getItem: () => null,
                        setItem: () => {},
                        removeItem: () => {}
                    };
                }
            })();
            const CHAR_INTERVAL_MS = 50;
            const DOUBLE_TAP_MS = 300;
            const VIBRATE_ENABLED =
                typeof navigator !== 'undefined' &&
                typeof navigator.vibrate === 'function';
            const supportsRequestIdle = typeof requestIdleCallback === 'function';
            const preferReducedMotion =
                typeof window !== 'undefined' &&
                window.matchMedia &&
                window.matchMedia('(prefers-reduced-motion: reduce)')
                .matches;

            // --- Mensaje (mantengo exactamente el texto original) ---
            const MSG = `Amor mío,

Como enseñaban los sabios de la antigüedad: lo más valioso no está en las palabras grandiosas sino en la constancia del alma. A tu lado encuentro esa calma y ese bien. Te amo infinitamente. Gracias por tolerarme —por tu paciencia, por tus risas que me devuelven entero y por aceptar mis defectos como quien cuida una luz frágil pero verdadera.

Prometo honrar este cariño con la misma sencillez y firmeza con la que los antiguos buscaban la virtud: con respeto, atención y gratitud diaria. Eres mi refugio y mi alegría.

Con todo mi amor,
Tu Inge.

`;

            // --- Elementos del DOM (resueltos una sola vez) ---
            const cont = document.getElementById('carta');
            const progressBar = document.getElementById('progress-bar');
            const skipBtn = document.getElementById('skip-btn');
            const sorpresaBtn = document.getElementById('btn-sorpresa');
            const sorpresa = document.getElementById('sorpresa');
            const themeToggle = document.getElementById('theme-toggle');
            const root = document.documentElement;

            if (!cont || !progressBar) {
                // Si por alguna razón el HTML cambió, abortamos rápidas y evitamos errores.
                console.warn('Elementos esperados no encontrados: cancelando script mejorado.');
                return;
            }

            // --- Estado interno ---
            const totalChars = MSG.length;
            let charIndex = 0;
            let rafId = null;
            let lastFrameTime = 0;
            let accumulated = 0;
            let running = false;
            let lastTap = 0;
            let finished = false;

            // Preparar progressBar: animar con GPU, y fallback width
            progressBar.style.willChange = 'transform, width';
            progressBar.style.transformOrigin = 'left center';
            progressBar.style.transform = 'scaleX(0)';
            progressBar.style.width = '0%';

            // --- Helpers ---
            function safeVibrate(pattern) {
                if (VIBRATE_ENABLED) {
                    try {
                        navigator.vibrate(pattern);
                    } catch (e) {
                        /* ignore */
                    }
                }
            }

            function setProgressRatio(ratio) {
                // ratio en [0,1]
                ratio = Math.max(0, Math.min(1, ratio));
                const percent = ratio * 100;
                const scale = 'scaleX(' + ratio + ')';

                // GPU transform + vendor prefix
                progressBar.style.transform = scale;
                progressBar.style.webkitTransform = scale;

                // Fallback width para asegurar visibilidad
                progressBar.style.width = percent + '%';

                // Actualizar accesibilidad
                progressBar.setAttribute('aria-valuenow', Math.round(percent));
            }

            function finishTyping() {
                if (finished) return;
                finished = true;
                running = false;
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
                // Escribir el texto completo de forma atómica:
                cont.textContent = MSG;
                setProgressRatio(1);
                cont.style.borderRight = 'none';
                // Actualizar aria
                cont.setAttribute('aria-busy', 'false');
                // Liberar listeners no necesarios
                removeRuntimeListeners();
                // vibración breve
                safeVibrate(50);
            }

            function removeRuntimeListeners() {
                // Quitamos listeners que ya no necesitamos para evitar retenciones
                skipBtn.removeEventListener('click', onSkipClick, false);
                cont.parentElement.removeEventListener('pointerup', onParentPointerUp, false);
                document.removeEventListener('keydown', onKeydown, false);
                // no eliminamos sorpresa/tema porque son controles válidos después
            }

            // --- Loop de "typing" controlado por rAF ---
            function tick(now) {
                if (!running) return;
                if (!lastFrameTime) lastFrameTime = now;
                const delta = now - lastFrameTime;
                lastFrameTime = now;
                accumulated += delta;

                // Si la persona prefiere reducir movimiento, saltamos animación y mostramos todo
                if (preferReducedMotion) {
                    finishTyping();
                    return;
                }

                const interval = CHAR_INTERVAL_MS;
                // Producir caracteres según tiempo acumulado
                while (accumulated >= interval && charIndex < totalChars) {
                    // Agregar el siguiente carácter
                    cont.textContent += MSG.charAt(charIndex);
                    charIndex += 1;
                    accumulated -= interval;
                }

                // Actualizar progreso (solo transform)
                setProgressRatio(charIndex / totalChars);

                if (charIndex >= totalChars) {
                    finishTyping();
                    return;
                }

                rafId = requestAnimationFrame(tick);
            }

            function startTyping() {
                if (running || finished) return;
                running = true;
                lastFrameTime = 0;
                accumulated = 0;
                // aria
                cont.setAttribute('aria-busy', 'true');
                // Comenzar loop
                rafId = requestAnimationFrame(tick);
            }

            // --- Event handlers ---
            function onSkipClick(e) {
                // debounce mínima para evitar doble ejecución accidental
                finishTyping();
                safeVibrate(50);
            }

            function onParentPointerUp(e) {
                // Usamos pointer events: funcionará para touch + mouse + pen
                // Detectar doble-tap (rápido) para terminar la escritura
                const now = Date.now();
                if (now - lastTap < DOUBLE_TAP_MS) {
                    finishTyping();
                }
                lastTap = now;
            }

            function onSorpresaClick(e) {
                const expanded = sorpresaBtn.getAttribute('aria-expanded') === 'true';
                const next = !expanded;
                sorpresaBtn.setAttribute('aria-expanded', String(next));
                sorpresaBtn.textContent = next ? 'Ocultar sorpresa' : 'Ver sorpresa';
                // Mostrar/ocultar usando display (HTML original usa display)
                sorpresa.style.display = next ? 'block' : 'none';
                if (next) {
                    // animar por CSS si existe; solo forzamos reflow mínimo para que la animación empiece
                    try {
                        sorpresa.style.animation = 'fadeIn 0.5s ease forwards';
                    } catch (err) {
                        /* ignore */
                    }
                }
                safeVibrate([30, 20, 30]);
            }

            // Aplica tema: atributo + clases para compatibilidad CSS
            function applyTheme(theme) {
                // 1. Attribute
                root.setAttribute('data-theme', theme);
                // 2. ClassList (para selectores .light / .dark)
                root.classList.remove('light', 'dark');
                root.classList.add(theme);

                // Actualiza botón
                themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
                themeToggle.setAttribute('aria-pressed', String(theme === 'dark'));

                // Persiste en localStorage sin bloquear
                const save = () => {
                    try {
                        localStorage.setItem('theme', theme);
                    } catch (e) {
                        // ignorar errores de storage
                    }
                };
                if (supportsRequestIdle) {
                    requestIdleCallback(save, {
                        timeout: 2000
                    });
                } else {
                    setTimeout(save, 0);
                }
            }

            function onThemeToggleClick() {
                // efecto ripple
                themeToggle.classList.add('ripple');
                setTimeout(() => themeToggle.classList.remove('ripple'), 600);

                // alterna tema basándose en la clase actual
                const current = root.classList.contains('light') ? 'dark' : 'light';
                applyTheme(current);
                safeVibrate(20);
            }

            function onKeydown(e) {
                if (e.key === 's' || e.key === 'S') {
                    finishTyping();
                }
            }

            function readSavedThemeOrSystem() {
                try {
                    const stored = localStorage.getItem('theme');
                    if (stored === 'light' || stored === 'dark') {
                        return stored;
                    }
                } catch (e) {
                    // ignorar
                }
                if (
                    window.matchMedia &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches
                ) {
                    return 'dark';
                }
                return 'light';
            }

            function init() {
                // Estado inicial del contenedor
                cont.textContent = '';
                cont.style.borderRight = ''; // dejar al CSS decidir mientras tipeamos

                // Empezar tipado (si reduce-motion: se acabará en finishTyping)
                startTyping();

                // Listeners runtime (pointer events y click)
                // passive:true for scroll/touch handlers only; pointerup shouldn't be passive
                const parent = cont.parentElement;
                if (parent) parent.addEventListener('pointerup', onParentPointerUp, false);

                // Skip and controls
                skipBtn.addEventListener('click', onSkipClick, false);
                sorpresaBtn.addEventListener('click', onSorpresaClick, false);
                themeToggle.addEventListener('click', onThemeToggleClick, false);

                // Keyboard shortcut
                document.addEventListener('keydown', onKeydown, false);

                // Apply saved theme
                applyTheme(readSavedThemeOrSystem());
            }

            // Ejecutar cuando el DOM esté listo (este script debe colocarse con defer)
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init, {
                    once: true
                });
            } else {
                // Ya listo
                init();
            }

            // Export para debugging leve (no requerido; no rompe API)
            // Si se quiere preservar "API pública" exponer en window bajo namespace opcional
            try {
                window.__cartaApp = window.__cartaApp || {};
                window.__cartaApp.finishTyping = finishTyping;
            } catch (e) {
                /* ignore non-writable window in some envs */
            }

        }());
    </script>

</body>

</html>
